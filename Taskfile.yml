version: "3"

tasks:
  run-local:
    desc: Run the app locally
    cmds:
      - npm run dev
    env:
      NODE_ENV: development
      DEBUG: "*,-babel"
      VITE_BACKEND_URL: http://localhost:8080
      VITE_FIREBASE_DATABASE: development
      PORT: 4000

  run:
    desc: Run the app locally
    cmds:
      - npm run dev
    env:
      NODE_ENV: development
      DEBUG: "*,-babel"
      VITE_BACKEND_URL: https://tournament-sync-dev-104889733361.europe-west1.run.app
      VITE_FIREBASE_DATABASE: development
      PORT: 4000

  run-beta:
    desc: Run the app as beta locally
    cmds:
      - npm run dev
    env:
      NODE_ENV: development
      DEBUG: "*,-babel"
      VITE_BACKEND_URL: https://tournament-sync-beta-104889733361.europe-west1.run.app
      VITE_FIREBASE_DATABASE: (default)
      PORT: 4000

  build:
    desc: Build the node app
    silent: true
    dir: .
    cmds:
      - npm run build

  test:
    desc: Test the node app
    dir: .
    cmds:
      - npm test

  populate-demo:
    desc: Populate Firestore with demo tournament data (4 matches spread throughout the day)
    cmds:
      - node scripts/populate-demo-tournament.js {{.SERVICE_ACCOUNT_KEY}}
    requires:
      vars: [SERVICE_ACCOUNT_KEY]

  help:
    desc: Display this help
    silent: true
    cmds:
      - task --list

  default:
    silent: true
    cmds:
      - task: help
