# Cloud Build pipeline for beachvolleyball-scoreboard
#
# Substitution variables (set per-trigger):
#   _FIREBASE_DATABASE  — Firestore database name: 'development' (dev) or '(default)' (beta/prod)
#   _BACKEND_URL        — Backend service URL for this environment
#   _HOSTING_TARGET     — Firebase Hosting site target: 'dev', 'beta', or 'prod'
#   _FIREBASE_PROJECT   — GCP / Firebase project ID

substitutions:
  _FIREBASE_DATABASE: 'development'
  _BACKEND_URL: ''
  _HOSTING_TARGET: 'dev'
  _FIREBASE_PROJECT: 'scoreboard-sandbox-fc7ac'

steps:
  - name: 'node:22'
    id: 'install'
    entrypoint: 'npm'
    args: ['ci']

  - name: 'node:22'
    id: 'build'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'VITE_FIREBASE_DATABASE=$_FIREBASE_DATABASE'
      - 'VITE_BACKEND_URL=$_BACKEND_URL'
    waitFor: ['install']

  - name: 'node:22'
    id: 'deploy'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g firebase-tools@latest
        firebase deploy --only hosting:$_HOSTING_TARGET --project $_FIREBASE_PROJECT
    waitFor: ['build']

options:
  logging: CLOUD_LOGGING_ONLY
